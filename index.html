<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKPNW | TERMINAL OPERACYJNY</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --pkp-blue: #0a192f; --pkp-gold: #b3935d; --success: #00e676; }
        body { margin: 0; background: #050a14; color: #e0e0e0; font-family: 'Roboto', sans-serif; }
        
        header { 
            background: var(--pkp-blue); padding: 15px; border-bottom: 2px solid var(--pkp-gold);
            display: flex; justify-content: space-between; align-items: center; 
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand i { color: var(--pkp-gold); }
        
        .main-content { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 15px; }
        .module-card { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 20px; backdrop-filter: blur(10px); 
        }

        .btn { 
            background: var(--pkp-gold); color: var(--pkp-blue); border: none; padding: 15px; 
            border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .input-field { 
            background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; 
            padding: 12px; width: 100%; box-sizing: border-box; border-radius: 6px; margin-bottom: 10px; 
        }

        #status-display { 
            margin-top: 15px; padding: 15px; border-radius: 8px; display: none;
            border-left: 5px solid var(--success); background: rgba(0,230,118,0.1);
        }

        .lang-picker span { cursor: pointer; margin-left: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div class="brand">
            <i class="material-icons">train</i>
            <div>
                <h1 style="margin:0; font-size:1.2rem;">PKPNW</h1>
                <span id="sub-title" style="font-size:0.6rem; color:var(--pkp-gold);">PAŃSTWOWE KRAJOWE PRZEWOZY NA WSCHÓD</span>
            </div>
        </div>
        <div class="lang-picker">
            <span onclick="setLang('pl')">PL</span>
            <span onclick="setLang('ru')">RU</span>
            <span onclick="setLang('en')">EN</span>
        </div>
    </header>

    <div class="main-content">
        <div class="module-card">
            <div id="db-status" style="font-size:0.7rem; color:orange; margin-bottom:10px;">ŁĄCZENIE Z BAZĄ...</div>
            <h2 id="h-verify">Weryfikacja Systemowa</h2>
            <input type="text" id="ticket-input" class="input-field" placeholder="WPISZ NUMER BILETU">
            <button class="btn" id="verify-btn">
                <i class="material-icons">sensors</i> <span id="b-check">SPRAWDŹ W BAZIE</span>
            </button>

            <div id="status-display">
                <b id="res-title" style="color:var(--success)">BILET ZWERYFIKOWANY</b>
                <p id="res-info" style="font-size:0.8rem; margin:5px 0 0 0;"></p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // Importujemy Firebase bezpośrednio z serwerów Google (CDN)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Twoja konfiguracja którą wkleiłeś
    const firebaseConfig = {
        apiKey: "AIzaSyCAfRIGWM44efVRf15mAOTzZMkiTaPHU5A",
        authDomain: "pkprw-332e1.firebaseapp.com",
        projectId: "pkprw-332e1",
        storageBucket: "pkprw-332e1.firebasestorage.app",
        messagingSenderId: "980957814716",
        appId: "1:980957814716:web:a81382e74561b1297d15b9",
        measurementId: "G-E1QQ3KSZNM"
    };

    // Inicjalizacja
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Potwierdzenie połączenia
    document.getElementById('db-status').innerHTML = "🟢 POŁĄCZONO Z CLOUD FIREBASE";
    document.getElementById('db-status').style.color = "#00e676";

    // Funkcja sprawdzania biletu w bazie
    async function checkTicketInDB() {
        const ticketID = document.getElementById('ticket-input').value;
        const display = document.getElementById('status-display');
        
        if(!ticketID) return;

        // Symulacja szukania w bazie (możesz potem dodać realne dokumenty w Firestore)
        console.log("Szukam biletu:", ticketID);
        
        display.style.display = 'block';
        document.getElementById('res-info').innerHTML = `
            ID: ${ticketID}<br>
            STATUS: AKTYWNY (ONLINE)<br>
            DATA SKANU: ${new Date().toLocaleString()}
        `;
    }

    // Podpięcie przycisku pod funkcję
    document.getElementById('verify-btn').addEventListener('click', checkTicketInDB);
</script>

<script>
    // Proste tłumaczenia
    const langData = {
        pl: { sub: "PAŃSTWOWE KRAJOWE PRZEWOZY NA WSCHÓD", h: "Weryfikacja Systemowa", b: "SPRAWDŹ W BAZIE" },
        ru: { sub: "ГОСУДАРСТВЕННЫЕ НАЦИОНАЛЬНЫЕ ПЕРЕВОЗКИ НА ВОСТОК", h: "Системная проверка", b: "ПРОВЕРИТЬ В БАЗЕ" },
        en: { sub: "STATE NATIONAL EASTERN TRANSPORT", h: "System Verification", b: "CHECK IN DATABASE" }
    };

    function setLang(l) {
        document.getElementById('sub-title').innerText = langData[l].sub;
        document.getElementById('h-verify').innerText = langData[l].h;
        document.getElementById('b-check').innerText = langData[l].b;
    }
</script>

</body>
</html>

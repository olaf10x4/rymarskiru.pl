<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP - System Obsługi Pasażera</title>
    <style>
        :root {
            --primary: #003366;
            --accent: #ffcc00;
            --bg: #f4f7f9;
            --text: #333;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Top Bar */
        .top-bar {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .lang-switch button {
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            color: white;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Main Container */
        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
        }

        /* Login Screen */
        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { margin-top: 0; color: var(--primary); font-size: 1.4rem; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Verification Screen (Hidden by default) */
        #verify-screen { display: none; }

        .status-box {
            border: 2px solid #ddd;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            border-radius: 8px;
            background: #fafafa;
        }

        .valid { border-color: var(--success); color: var(--success); background: #f0fff0; }

        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="font-weight: bold; letter-spacing: 1px;">SOP v4.8.2</div>
    <div class="lang-switch">
        <button onclick="changeLang('pl')">PL</button>
        <button onclick="changeLang('en')">EN</button>
    </div>
</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2 data-pl="Logowanie Pracownika" data-en="Staff Login">Logowanie Pracownika</h2>
        <div class="input-group">
            <label data-pl="ID Konduktora" data-en="Conductor ID">ID Konduktora</label>
            <input type="text" value="KON-192-00">
        </div>
        <div class="input-group">
            <label data-pl="Hasło / Kod PIN" data-en="Password / PIN">Hasło / Kod PIN</label>
            <input type="password" value="********">
        </div>
        <button class="btn-main" onclick="handleLogin()" data-pl="ZALOGUJ SIĘ" data-en="SIGN IN">ZALOGUJ SIĘ</button>
    </div>

    <div id="verify-screen" class="card">
        <h2 data-pl="Weryfikacja Biletu" data-en="Ticket Verification">Weryfikacja Biletu</h2>
        <div class="input-group">
            <input type="text" id="ticket-id" placeholder="Wprowadź nr biletu / Skanuj">
        </div>
        <button class="btn-main" onclick="verifyTicket()" data-pl="SPRAWDŹ" data-en="VERIFY">SPRAWDŹ</button>

        <div id="result" class="status-box">
            <span data-pl="Oczekiwanie na dane..." data-en="Awaiting data...">Oczekiwanie na dane...</span>
        </div>

        <button onclick="location.reload()" style="background:none; border:none; color: #888; cursor:pointer; width:100%;" data-pl="Wyloguj" data-en="Logout">Wyloguj</button>
    </div>

    <div class="footer-info">
        &copy; 2026 Rail Systems International. Terminal ID: 44-X9.
    </div>
</div>

<script>
    function changeLang(lang) {
        document.querySelectorAll('[data-pl]').forEach(el => {
            el.innerText = el.getAttribute('data-' + lang);
        });
    }

    function handleLogin() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('verify-screen').style.display = 'block';
    }

    function verifyTicket() {
        const res = document.getElementById('result');
        const input = document.getElementById('ticket-id').value;
        
        if(input.length < 3) {
            alert("Błąd: Wprowadź poprawny numer.");
            return;
        }

        res.innerHTML = "WERYFIKACJA...";
        res.className = "status-box";

        setTimeout(() => {
            res.classList.add('valid');
            res.innerHTML = `
                <div style="font-size: 1.2rem; font-weight:bold;">BILET WAŻNY / VALID</div>
                <div style="font-size: 0.8rem; margin-top: 10px; color: #333;">
                    TRASA: Warszawa Centralna - Gdynia Główna<br>
                    KLASA: 1 | MIEJSCE: 42<br>
                    DATA: 19.04.2026
                </div>
            `;
        }, 800);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PKP Wschód - NextGen</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --primary: #0044cc;
            --accent: #ff9f1c;
            --dark: #0f172a;
            --success: #10b981;
            --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; 
            background: #f1f5f9; 
            color: var(--dark);
            padding-bottom: 80px; /* Miejsce na dolne menu */
        }

        /* --- NAGŁÓWEK --- */
        header {
            background: var(--dark);
            color: white;
            padding: 20px;
            border-radius: 0 0 25px 25px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .user-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- WYSZUKIWARKA (Neumorphism) --- */
        .search-section {
            padding: 0 20px;
            margin-top: -30px;
        }
        .search-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }
        .input-box {
            display: flex;
            align-items: center;
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }
        .input-box i { color: var(--primary); margin-right: 10px; }
        .input-box input { border: none; background: transparent; outline: none; width: 100%; font-family: 'Outfit'; }

        /* --- LIVE MAP (Mała na telefon) --- */
        #map {
            height: 200px;
            margin: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            z-index: 1;
        }

        /* --- POCIĄGI LIVE --- */
        .live-trains { padding: 0 20px; }
        .train-item {
            background: white;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-left: 6px solid var(--primary);
        }
        .train-info b { font-size: 1.1rem; display: block; }
        .train-status { text-align: right; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .badge-green { background: #dcfce7; color: #166534; }

        /* --- WAGONY (Detale) --- */
        .comp-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 20px;
            scrollbar-width: none;
        }
        .wagon-icon {
            min-width: 60px; height: 35px;
            background: var(--dark); color: white;
            border-radius: 6px; font-size: 0.7rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- DOLNE MENU (TAB BAR) --- */
        .nav-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            border-radius: 25px 25px 0 0;
            z-index: 2000;
        }
        .nav-item { text-align: center; color: #94a3b8; font-size: 0.8rem; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* --- PRZYCISK QR --- */
        .qr-fab {
            position: fixed;
            bottom: 90px; right: 20px;
            background: var(--accent);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(255, 159, 28, 0.4);
            z-index: 1000;
        }

        /* Animacje */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .live-dot { height: 8px; width: 8px; background: red; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <div class="avatar">JK</div>
            <div>
                <div style="font-size: 0.8rem; opacity: 0.7;">Witaj z powrotem,</div>
                <div style="font-weight: 600;">Jan Kowalski (Konduktor)</div>
            </div>
            <i class="fa-regular fa-bell" style="margin-left: auto; font-size: 1.2rem;"></i>
        </div>
        <div style="font-size: 1.5rem; font-weight: 800;">Gdzie jedziemy?</div>
    </header>

    <div class="search-section">
        <div class="search-card">
            <div class="input-box">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" placeholder="Stacja początkowa" value="Warszawa Wschodnia">
            </div>
            <div class="input-box">
                <i class="fa-solid fa-train-subway"></i>
                <input type="text" placeholder="Stacja docelowa" value="Lublin Główny">
            </div>
            <button style="width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1rem;">
                SPRAWDŹ POŁĄCZENIA
            </button>
        </div>
    </div>

    <div id="map"></div>

    <div class="live-trains">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0;">Pociągi na trasie <span class="live-dot"></span></h3>
            <span style="font-size: 0.8rem; color: var(--primary);">Zobacz wszystkie</span>
        </div>

        <div class="train-item">
            <div class="train-info">
                <b>IC 12102 NIEMCEWICZ</b>
                <span style="font-size: 0.8rem; color: #64748b;">Peron 2 • Tor 4</span>
                <div class="comp-scroll" style="padding: 10px 0 0 0;">
                    <div class="wagon-icon">LOK</div>
                    <div class="wagon-icon" style="background: var(--accent);">1 KL</div>
                    <div class="wagon-icon">WARS</div>
                    <div class="wagon-icon">2 KL</div>
                </div>
            </div>
            <div class="train-status">
                <div class="badge badge-green">O CZASIE</div>
                <div style="margin-top: 5px; font-weight: bold;">14:20</div>
            </div>
        </div>

        <div class="train-item" style="border-left-color: var(--accent);">
            <div class="train-info">
                <b>TLK 38104 BYSTRZYCA</b>
                <span style="font-size: 0.8rem; color: #64748b;">Peron 1 • Tor 1</span>
            </div>
            <div class="train-status">
                <div class="badge" style="background: #fee2e2; color: #991b1b;">+10 MIN</div>
                <div style="margin-top: 5px; font-weight: bold; color: #991b1b;">15:05</div>
            </div>
        </div>
    </div>

    <div class="qr-fab">
        <i class="fa-solid fa-qrcode"></i>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            Start
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-ticket"></i>
            Bilety
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-map-location-dot"></i>
            Mapa
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-user-gear"></i>
            Panel
        </a>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Mapa dopasowana do telefonów
        const map = L.map('map', { zoomControl: false }).setView([52.2, 22.5], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Dodanie pociągów jako ikony
        const trainIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background:blue; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>",
            iconSize: [12, 12]
        });

        L.marker([52.23, 21.01], {icon: trainIcon}).addTo(map).bindPopup("IC NIEMCEWICZ");
        L.marker([51.24, 22.56], {icon: trainIcon}).addTo(map).bindPopup("TLK BYSTRZYCA");

        // Symulacja "dużo rzeczy" - powiadomienie push
        setTimeout(() => {
            alert("🔔 Powiadomienie: Twój pociąg IC 12102 wjechał na stację Siedlce.");
        }, 5000);
    </script>
</body>
</html>

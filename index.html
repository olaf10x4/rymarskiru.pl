<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKPNW - System Operacyjny</title>
    <style>
        :root {
            --pkp-blue: #002347;
            --pkp-gold: #c5a059;
            --bg-light: #f0f2f5;
            --success: #27ae60;
            --danger: #c0392b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #333;
        }

        /* Header */
        header {
            background: var(--pkp-blue);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--pkp-gold);
        }

        .logo-area b { font-size: 1.4rem; letter-spacing: 2px; }
        .logo-area span { display: block; font-size: 0.7rem; opacity: 0.8; }

        .lang-picker button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* Container */
        .app-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--pkp-blue); margin-bottom: 25px; }

        .input-box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--pkp-blue); outline: none; }

        .btn-action {
            width: 100%;
            padding: 14px;
            background: var(--pkp-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-action:hover { background: #003a75; }

        /* Statuses */
        #result-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .status-ok { background: #eafff2; border: 2px solid var(--success); color: var(--success); }

        footer {
            background: #ddd;
            padding: 10px;
            font-size: 0.7rem;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <b>PKPNW</b>
        <span id="sub-title">PAŃSTWOWE KRAJOWE PRZEWOZY NA WSCHOD</span>
    </div>
    <div class="lang-picker">
        <button onclick="setLang('pl')">PL</button>
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('en')">EN</button>
    </div>
</header>

<div class="app-container">
    <div id="login-panel" class="card">
        <h2 id="h-login">Logowanie Systemowe</h2>
        <div class="input-box">
            <label id="l-user">ID Konduktora / Login</label>
            <input type="text" id="user-id" placeholder="np. 44021">
        </div>
        <div class="input-box">
            <label id="l-pass">Hasło / Haslo</label>
            <input type="password" id="user-pass">
        </div>
        <button class="btn-action" onclick="doLogin()" id="b-login">ZALOGUJ</button>
    </div>

    <div id="main-panel" class="card" style="display: none;">
        <h2 id="h-verify">Weryfikacja Biletu</h2>
        <div class="input-box">
            <label id="l-ticket">Numer Biletu (E-Ticket ID)</label>
            <input type="text" id="t-number" placeholder="Wpisz lub skanuj">
        </div>
        <button class="btn-action" onclick="checkTicket()" id="b-verify">SPRAWDŹ BILET</button>

        <div id="result-area" class="status-ok">
            <strong id="r-status">BILET WAŻNY</strong>
            <p id="r-info" style="font-size: 0.8rem;"></p>
        </div>
        
        <p onclick="location.reload()" style="text-align:center; cursor:pointer; color: #888; margin-top: 15px; font-size: 0.8rem;">Wyloguj / Logout</p>
    </div>
</div>

<footer>
    SYSTEM OPERACYJNY PKPNW v8.0.1 | TERMINAL ID: TERMINAL-W04
</footer>

<script>
    const translations = {
        pl: {
            sub: "PAŃSTWOWE KRAJOWE PRZEWOZY NA WSCHOD",
            h_login: "Logowanie Systemowe",
            l_user: "ID Konduktora",
            l_pass: "Hasło",
            b_login: "ZALOGUJ",
            h_verify: "Weryfikacja Biletu",
            l_ticket: "Numer Biletu",
            b_verify: "SPRAWDŹ BILET",
            r_status: "BILET WAŻNY",
            r_info: "Trasa: Warszawa -> Mińsk | Klasa: 2"
        },
        ru: {
            sub: "ГОСУДАРСТВЕННЫЕ НАЦИОНАЛЬНЫЕ ПЕРЕВОЗКИ НА ВОСТОК",
            h_login: "Вход в систему",
            l_user: "ID Кондуктора",
            l_pass: "Пароль",
            b_login: "ВОЙТИ",
            h_verify: "Проверка билета",
            l_ticket: "Номер билета",
            b_verify: "ПРОВЕРИТЬ БИЛЕТ",
            r_status: "БИЛЕТ ДЕЙСТВИТЕЛЕН",
            r_info: "Маршрут: Варшава -> Минск | Класс: 2"
        },
        en: {
            sub: "STATE NATIONAL EASTERN TRANSPORT",
            h_login: "Staff Login",
            l_user: "Conductor ID",
            l_pass: "Password",
            b_login: "LOGIN",
            h_verify: "Ticket Verification",
            l_ticket: "Ticket Number",
            b_verify: "VERIFY TICKET",
            r_status: "TICKET VALID",
            r_info: "Route: Warsaw -> Minsk | Class: 2"
        }
    };

    function setLang(lang) {
        const t = translations[lang];
        document.getElementById('sub-title').innerText = t.sub;
        document.getElementById('h-login').innerText = t.h_login;
        document.getElementById('l-user').innerText = t.l_user;
        document.getElementById('l-pass').innerText = t.l_pass;
        document.getElementById('b-login').innerText = t.b_login;
        document.getElementById('h-verify').innerText = t.h_verify;
        document.getElementById('l-ticket').innerText = t.l_ticket;
        document.getElementById('b-verify').innerText = t.b_verify;
        document.getElementById('r-status').innerText = t.r_status;
        document.getElementById('r-info').innerText = t.r_info;
    }

    function doLogin() {
        document.getElementById('login-panel').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
    }

    function checkTicket() {
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        res.style.opacity = '0.5';
        setTimeout(() => { res.style.opacity = '1'; }, 200);
    }
</script>

</body>
</html>
